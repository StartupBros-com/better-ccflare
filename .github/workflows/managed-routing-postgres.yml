name: Managed Routing Foundation Gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  managed-routing-foundation:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: better_ccflare_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d better_ccflare_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI generated modules
        run: bun run build:cli

      - name: Build dashboard generated modules
        run: bun run build:dashboard

      - name: Run focused managed-routing database tests
        run: >-
          bun test
          packages/database/src/__tests__/managed-routing-migrations.test.ts
          packages/database/src/adapters/__tests__/bun-sql-adapter-batch.test.ts
          packages/database/src/repositories/__tests__/combo-managed-policy.test.ts
          packages/database/src/repositories/__tests__/combo-priority.test.ts

      - name: Run managed-routing PostgreSQL integration
        env:
          BETTER_CCFLARE_TEST_POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/better_ccflare_test
        run: bun test packages/database/src/__tests__/managed-routing-postgres.integration.test.ts

      - name: Run full test suite
        run: |
          for root in apps packages scripts tests; do
            if [[ ! -d "$root" ]]; then
              echo "::error::Test root is missing: $root"
              exit 1
            fi
          done

          mapfile -d '' -t test_files < <(
            find apps packages scripts tests -type f \
              \( -name '*.test.ts' -o -name '*.test.tsx' -o -name '*.spec.ts' -o -name '*.spec.tsx' \) \
              -print0 | LC_ALL=C sort -z
          )

          if (( ${#test_files[@]} == 0 )); then
            echo "::error::No test files found"
            exit 1
          fi

          echo "Running ${#test_files[@]} test files in isolated Bun processes"
          failures=()
          for test_file in "${test_files[@]}"; do
            printf '\n==> %s\n' "$test_file"
            if ! bun test --timeout 15000 "$test_file"; then
              failures+=("$test_file")
            fi
          done

          if (( ${#failures[@]} > 0 )); then
            printf '\n::error::%d isolated test file(s) failed\n' "${#failures[@]}"
            printf '  %q\n' "${failures[@]}"
            exit 1
          fi

          printf '\nAll %d isolated test files passed\n' "${#test_files[@]}"

      - name: Run lint
        run: bun run lint

      - name: Run typecheck
        run: bun run typecheck

      - name: Run format
        run: bun run format

      - name: Verify lint and format left the checkout clean
        run: |
          git diff --check
          git diff --exit-code
          test -z "$(git status --porcelain)"
